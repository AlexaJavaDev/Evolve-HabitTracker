<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить привычку — Evolve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .navbar-brand { font-weight: 700; font-size: 1.6rem; color: #2d4059 !important; }
        .container { max-width: 600px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
    </style>
</head>
<body>

<!-- Навигация -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">🌱 Evolve</a>
        <div class="ms-auto">
            <a href="/habits/add" class="btn btn-outline-secondary btn-sm rounded-pill px-4">➕ Новая привычка</a>
        </div>
    </div>
</nav>

<!-- Форма -->
<div class="container mt-4">
    <div class="card p-4">
        <h2 class="mb-4">➕ Новая привычка</h2>
        <form th:action="@{/habits/add}" th:object="${habit}" method="post">
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Период (дней)</label>
                <input type="range" class="form-range" th:field="*{duration}" min="5" max="30" step="1"
                       oninput="document.getElementById('durationValue').textContent = this.value">
                <span id="durationValue" th:text="*{duration}">7</span> дней
            </div>

            <div class="mb-3">
                <label class="form-label">Цвет квадратиков</label>
                <select class="form-select" th:field="*{color}">
                    <option value="#a8d8ea">Нежно-голубой</option>
                    <option value="#ffb3b3">Нежно-розовый</option>
                    <option value="#b3d9ff">Светло-синий</option>
                    <option value="#d9b3ff">Лавандовый</option>
                    <option value="#b3ffb3">Мятный</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Частота</label>
                <select class="form-select" th:field="*{frequency}">
                    <option value="DAILY">Ежедневно</option>
                    <option value="WEEKDAYS">По будням</option>
                    <option value="WEEKENDS">По выходным</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100">Сохранить</button>
            <a href="/habits" class="btn btn-secondary w-100 mt-2">Отмена</a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
