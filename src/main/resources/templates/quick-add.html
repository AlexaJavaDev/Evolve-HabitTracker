<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Быстрое добавление — Evolve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .navbar-brand { font-weight: 700; font-size: 1.6rem; color: #2d4059 !important; }
        .container { max-width: 600px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">🌱 Evolve</a>
        <div class="ms-auto">
            <a href="/habits/add" class="btn btn-outline-secondary btn-sm rounded-pill px-4">➕ Своя</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card p-4">
        <h2 class="mb-4">⚡ Быстрое добавление</h2>
        <p class="text-muted">Выбери привычку из списка:</p>
        <div class="list-group">
            <form th:each="habit : ${quickHabits}"
                  method="post"
                  th:action="@{/habits/quick-add}">
                <input type="hidden" name="name" th:value="${habit}">
                <button type="submit" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span th:text="${habit}"></span>
                    <span class="badge bg-primary rounded-pill">+</span>
                </button>
            </form>
        </div>
        <hr>
        <a href="/habits/add" class="btn btn-success w-100 mt-3">➕ Добавить свою привычку</a>
        <a href="/habits" class="btn btn-secondary w-100 mt-2">Назад</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
