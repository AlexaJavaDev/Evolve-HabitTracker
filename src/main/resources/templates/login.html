<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Evolve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.6rem;
            color: #2d4059 !important;
        }
        .container {
            flex: 1;
        }
        .login-box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
        }
        footer {
            margin-top: auto;
        }
    </style>
</head>
<body>

<!-- Навигация -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">🌱 Evolve</a>
        <div class="ms-auto">
            <a href="/register" class="btn btn-primary btn-sm rounded-pill px-4">Регистрация</a>
        </div>
    </div>
</nav>

<!-- Форма входа -->
<div class="container">
    <div class="login-box">
        <h2 class="text-center mb-4">Вход</h2>
        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
            <div class="text-center mt-3">
                <a href="/register" class="text-decoration-none">Ещё нет аккаунта? Зарегистрироваться</a>
            </div>
            <div th:if="${param.error}" class="alert alert-danger mt-3">Неверный логин или пароль</div>
            <div th:if="${param.logout}" class="alert alert-info mt-3">Вы вышли</div>
        </form>
    </div>
</div>

<!-- Footer -->
<footer class="footer mt-5 py-3 bg-light border-top">
    <div class="container text-center">
        <span class="text-muted">
            © 2026 Evolve | Трекер привычек на Spring Boot &amp; Thymeleaf
            <br>
            <a href="mailto:annstr.94@gmail.com" class="text-decoration-none">📧 annstr.94@gmail.com</a>
            &nbsp;|&nbsp;
            <a href="https://github.com/AlexaJavaDev" target="_blank" class="text-decoration-none">🐙 GitHub</a>
        </span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
