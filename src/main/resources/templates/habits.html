<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve — трекер привычек</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.6rem;
            color: #2d4059 !important;
        }
        .page-header {
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- ======== 1. Верхняя панель (логотип) ======== -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">🌱 Evolve</a>
        <div class="ms-auto">
            <a href="/habits/add" class="btn btn-outline-secondary btn-sm rounded-pill px-4">➕ Новая привычка</a>
        </div>
    </div>
</nav>

<!-- ======== 2. Контент ======== -->
<div class="container mt-4">

    <!-- 2.1 Заголовок страницы "Список привычек" -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2 class="fw-light mb-0">Список привычек</h2>
        <span class="badge bg-light text-dark"
              th:text="${habits != null ? habits.size() : 0} + ' привычек'">0 привычек</span>
    </div>

    <!-- Кнопки быстрого добавления -->
    <div class="mb-3 mt-2">
        <a href="/habits/quick-add" class="btn btn-primary rounded-pill px-4">⚡ Быстро добавить</a>
        <a href="/habits/add" class="btn btn-outline-secondary rounded-pill px-4">➕ Своя привычка</a>
    </div>

    <!-- 2.2 Прогресс дня (приветствие + полоска) -->
    <div class="row mt-4 align-items-center">
        <div class="col">
            <h5 class="mb-0">Доброе утро</h5>
            <small class="text-muted">Сегодня выполнено <strong>0</strong> из <strong>0</strong>
                привычек</small>
        </div>
        <div class="col-auto" style="min-width: 160px;">
            <div class="progress" style="height: 8px; border-radius: 20px;">
                <div class="progress-bar" style="width: 0%; background: #aa96da; border-radius: 20px;">
                </div>
            </div>
        </div>
    </div>

    <hr>

    <!-- 2.3 Список привычек -->
    <div th:if="${habits != null && !habits.isEmpty()}">

        <!-- 2.4 Карточки привычек -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="habit : ${habits}">
                <div class="card h-100 shadow-sm" style="border-left: 8px solid" th:style="'border-left-color: ' + (habit.color ?: '#aa96da')">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${habit.name}">Название</h5>
                        <p class="card-text text-muted small" th:text="${habit.description}">Описание</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="badge bg-light text-dark" th:text="${habit.frequency}">Ежедневно</span>
                            <form method="post" th:action="@{/habits/delete/{id}(id=${habit.id})}">
                                <button type="submit" class="btn btn-outline-danger btn-sm">🗑️ Удалить</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<!-- Bootstrap JS (для бургера) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ======== Footer ======== -->
<footer class="footer mt-5 py-3 bg-light border-top">
    <div class="container text-center">
        <span class="text-muted">© 2026 Evolve | Трекер привычек на Spring Boot &amp; Thymeleaf
            <br>
        <a href="mailto:annstr.94@gmail.com" class="text-decoration-none">📧 annstr.94@gmail.com</a>
        &nbsp;|&nbsp;
        <a href="https://github.com/AlexaJavaDev" target="_blank" class="text-decoration-none">🐙 GitHub</a>
        </span>
    </div>
</footer>
</body>

</html>
